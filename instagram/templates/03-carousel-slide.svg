<svg viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="1080" height="1080" fill="#ffffff"/>
  <rect x="0" y="0" width="1080" height="14" fill="#10b981"/>

  <!-- Slide number -->
  <circle cx="140" cy="150" r="50" fill="#0f1f6b"/>
  <text x="140" y="165" fill="#ffffff" font-size="44" font-weight="800" text-anchor="middle">1</text>

  <!-- Heading -->
  <text x="80" y="320" fill="#0a1340" font-size="60" font-weight="800">
    <tspan x="80" dy="0">Résiliation</tspan>
    <tspan x="80" dy="72">à tout moment</tspan>
  </text>

  <!-- Body -->
  <text x="80" y="450" fill="#475569" font-size="38" font-weight="400">
    <tspan x="80" dy="0">Depuis juin 2022, vous pouvez</tspan>
    <tspan x="80" dy="52">résilier et changer d'assurance</tspan>
    <tspan x="80" dy="52">emprunteur QUAND VOUS VOULEZ,</tspan>
    <tspan x="80" dy="52">sans frais ni pénalité.</tspan>
  </text>

  <!-- Highlight box -->
  <rect x="80" y="700" width="920" height="140" rx="20" fill="#ecfdf5"/>
  <text x="120" y="760" fill="#16a34a" font-size="34" font-weight="700">
    <tspan x="120" dy="0">Seule condition : un préavis</tspan>
    <tspan x="120" dy="46">de 10 jours ouvrés</tspan>
  </text>

  <!-- Footer -->
  <text x="1000" y="1020" fill="#94a3b8" font-size="28" font-weight="700" text-anchor="end">Assur Emprunteur</text>
  <text x="80" y="1020" fill="#cbd5e1" font-size="28" font-weight="700">1/4</text>
</svg>
