<svg viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="1080" height="1080" fill="#ffffff"/>
  <rect x="0" y="0" width="1080" height="14" fill="#10b981"/>

  <!-- Slide number -->
  <circle cx="540" cy="150" r="50" fill="#0f1f6b"/>
  <text x="540" y="165" fill="#ffffff" font-size="44" font-weight="800" text-anchor="middle">3</text>

  <!-- Heading -->
  <text x="540" y="320" fill="#0a1340" font-size="60" font-weight="800" text-anchor="middle">
    <tspan x="540" dy="0">Droit à l'oubli</tspan>
    <tspan x="540" dy="72">réduit à 5 ans</tspan>
  </text>

  <!-- Body -->
  <text x="540" y="450" fill="#475569" font-size="38" font-weight="400" text-anchor="middle">
    <tspan x="540" dy="0">Pour un cancer ou une hépatite C</tspan>
    <tspan x="540" dy="52">guéri(e), vous n'avez plus à le</tspan>
    <tspan x="540" dy="52">déclarer après 5 ans (au lieu</tspan>
    <tspan x="540" dy="52">de 10 ans auparavant).</tspan>
  </text>

  <!-- Highlight box -->
  <rect x="80" y="700" width="920" height="140" rx="20" fill="#ecfdf5"/>
  <text x="540" y="760" fill="#16a34a" font-size="34" font-weight="700" text-anchor="middle">
    <tspan x="540" dy="0">Des tarifs plus justes pour</tspan>
    <tspan x="540" dy="46">les anciens malades</tspan>
  </text>

  <!-- Footer -->
  <text x="540" y="1020" fill="#94a3b8" font-size="28" font-weight="700" text-anchor="middle">Assur Emprunteur · 4/4</text>
</svg>
