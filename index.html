    {
      "@context": "https://schema.org",

        {
          "@type": "Question",
          "name": "Puis-je changer d'assurance emprunteur à tout moment ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui. Depuis la loi Lemoine de 2022, vous pouvez résilier et changer d'assurance emprunteur à tout moment, sans frais ni pénalité, quelle que soit la date de signature de votre prêt."
          }
        },
        {
          "@type": "Question",
          "name": "Combien peut-on économiser en changeant d'assurance emprunteur ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "En moyenne, les emprunteurs économisent entre 5 000€ et 15 000€ sur la durée totale de leur prêt en passant par un courtier comme Assur Emprunteur, soit jusqu'à 60% par rapport à l'assurance proposée par leur banque."
          }
        },
        {
          "@type": "Question",
          "name": "Ma banque peut-elle refuser ma nouvelle assurance emprunteur ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Non, votre banque est légalement obligée d'accepter votre nouvelle assurance si elle présente des garanties au moins équivalentes à celles du contrat groupe. Assur Emprunteur vérifie systématiquement cette équivalence des garanties."
          }
        },
        {
          "@type": "Question",
          "name": "Combien de temps prend le changement d'assurance emprunteur ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "En moyenne, le délai total est de 10 à 20 jours ouvrés. Assur Emprunteur gère toutes les démarches administratives avec votre banque : constitution du dossier, envoi des documents et suivi jusqu'à la résiliation effective."
          }
        },
        {
          "@type": "Question",
          "name": "Le service Assur Emprunteur est-il gratuit ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui, le service de comparaison et de conseil est entièrement gratuit pour l'emprunteur. Assur Emprunteur est rémunéré par les compagnies d'assurance partenaires sous forme de commission, sans aucun impact sur le tarif proposé."
          }
        },
        {
          "@type": "Question",
          "name": "Dois-je passer un questionnaire de santé pour changer d'assurance ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Depuis la loi Lemoine, les emprunteurs dont le crédit se termine avant leurs 60 ans et dont le capital assuré est inférieur à 200 000€ par tête sont totalement exonérés de questionnaire de santé."
          }
        }
      ]
    }
