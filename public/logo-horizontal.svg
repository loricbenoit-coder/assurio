<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 100" fill="none">
  <!-- Icône carrée centrée verticalement -->
  <rect x="0" y="8" width="84" height="84" rx="14" fill="#0f1f6b"/>
  <line x1="18" y1="76" x2="52" y2="22"
        stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="42" y1="80" x2="76" y2="26"
        stroke="#10b981" stroke-width="8" stroke-linecap="round"/>

  <!-- Wordmark aligné verticalement au centre -->
  <text x="104" y="46"
        font-family="Arial Black, Helvetica, sans-serif"
        font-weight="900"
        font-size="30"
        fill="#0f1f6b"
        letter-spacing="-0.5">ASSUR</text>
  <text x="104" y="46"
        font-family="Arial Black, Helvetica, sans-serif"
        font-weight="900"
        font-size="30"
        fill="#10b981"
        letter-spacing="-0.5"
        dx="112">EMPRUNTEUR</text>

  <!-- Tagline -->
  <text x="106" y="70"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="400"
        font-size="12"
        fill="#94a3b8"
        letter-spacing="2.5">COURTIER EN ASSURANCE</text>
</svg>
